spring.application.name=demo

# -----------------------------
# JWT Configuration
# -----------------------------
jwt.secret=RevPlaySuperSecretKeyForJsonWebTokens1234567890
jwt.expiration=86400000

# -----------------------------
# Database Connection
# -----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/revplay_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root


spring.datasource.password=Prasad@666

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# -----------------------------
# Hibernate / JPA Settings
# -----------------------------
# 'update' tells Spring to check your Java Entities against your MySQL tables and link them safely
spring.jpa.hibernate.ddl-auto=update
# This will print the actual SQL queries in your terminal so you can see what Spring is doing!
spring.jpa.show-sql=true

# Allow files up to 15 Megabytes (Perfect for high-quality MP3s)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# --- LOGGING CONFIGURATION ---
# Show basic Spring Boot info
logging.level.root=INFO
# Show detailed DEBUG logs ONLY for your specific code
logging.level.com.example.demo=DEBUG
# Save logs to a physical file so you can review them later!
logging.file.name=logs/revplay-application.log