# ----------------------------------
# Application
# ----------------------------------
spring.application.name=demo
server.port=8080
# Listen on all network interfaces so EC2 public IP is accessible
server.address=0.0.0.0

# ----------------------------------
# JWT Configuration
# ----------------------------------
jwt.secret=RevPlaySuperSecretKeyForJsonWebTokens1234567890
jwt.expiration=86400000   # 1 day in milliseconds

# ----------------------------------
# Database Configuration
# ----------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/revplay?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=revplayuser
spring.datasource.password=Revplay123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------
# JPA / Hibernate
# ----------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ----------------------------------
# File Upload Configuration
# ----------------------------------
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ----------------------------------
# Logging
# ----------------------------------
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.file.name=logs/revplay-application.log
